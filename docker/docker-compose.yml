services:
  # ----------------------------------------------------------------------------
  # PostgreSQL 16 Database Service
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: notifier-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notifier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
      POSTGRES_DB: ${POSTGRES_DB:-notifier}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - notifier-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notifier} -d ${POSTGRES_DB:-notifier}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis 7 Cache Service (Required by Evolution API)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: notifier-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - notifier-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Evolution API Service (WhatsApp Gateway)
  # ----------------------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: notifier-evolution-api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    environment:
      - DOCKER_ENV=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-notifier}:${POSTGRES_PASSWORD:-change-me-strong-password}@postgres:5432/${POSTGRES_DB_EVOLUTION:-evolution}?sslmode=disable
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FIND_INSTANCES=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - PROVIDER_ENABLED=false
      - PROVIDER_DEFAULT=baileys
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET
    volumes:
      - evolution-data:/instance
    networks:
      - notifier-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ----------------------------------------------------------------------------
  # n8n Orchestrator Service
  # ----------------------------------------------------------------------------
  n8n:
    build:
      context: .
      dockerfile: ./n8n/Dockerfile
    container_name: notifier-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB_N8N:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-notifier}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-change-me-strong-password}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
      - TZ=${TZ:-Europe/Madrid}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-random-n8n-encryption-key-12345}
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      # Additional environment configurations passed directly
      - BOT_ENABLED=${BOT_ENABLED:-false}
      - BOT_LANGUAGE=${BOT_LANGUAGE:-es}
      - DEFAULT_COUNTRY_CODE=${DEFAULT_COUNTRY_CODE:-+34}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-clinic-notifier}
      - MAX_CONTEXT_MESSAGES=${MAX_CONTEXT_MESSAGES:-10}
      - ENABLE_CROSS_APPOINTMENT_MEMORY=${ENABLE_CROSS_APPOINTMENT_MEMORY:-true}
      - PROFILE_MEMORY_RETENTION_DAYS=${PROFILE_MEMORY_RETENTION_DAYS:-90}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS:-72}
    volumes:
      - n8n-data:/home/node/.n8n
      # Mount configuration files for direct consumption inside workflows
      - ../config:/opt/notifier/config:ro
      # Mount workflows for n8n-cli importing
      - ./n8n/workflows:/opt/notifier/workflows:ro
    networks:
      - notifier-network
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  notifier-network:
    name: notifier-network
    driver: bridge

volumes:
  postgres-data:
    name: notifier-postgres-data
  redis-data:
    name: notifier-redis-data
  evolution-data:
    name: notifier-evolution-data
  n8n-data:
    name: notifier-n8n-data
